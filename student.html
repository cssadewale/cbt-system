<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #09090b; --surface: #18181b; --surface-hover: #27272a; 
            --primary: #10b981; --primary-hover: #059669; 
            --border: #27272a; --text: #f4f4f5; --text-muted: #a1a1aa; 
            --radius: 20px; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: var(--radius); width: 100%; max-width: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
        
        h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 15px; }
        
        label { display: block; font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        input { width: 100%; padding: 18px; margin-bottom: 24px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); color: white; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15); }
        
        button { width: 100%; padding: 18px; background: var(--primary); color: #000; font-size: 18px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-hover); transform: scale(0.99); }
        
        /* Exam Elements */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .timer-box { font-size: 24px; font-weight: 700; color: var(--primary); font-family: monospace; background: rgba(16,185,129,0.1); padding: 8px 16px; border-radius: 8px; }
        
        /* Visual Progress Bar */
        .progress-container { width: 100%; background: var(--border); height: 8px; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }
        
        .question-text { font-size: 22px; font-weight: 600; line-height: 1.5; margin-bottom: 30px; min-height: 80px; }
        
        .opt { width: 100%; text-align: left; padding: 20px; background: var(--bg); border: 2px solid var(--border); color: var(--text); margin-bottom: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 16px; display: flex; align-items: center; }
        .opt:hover { border-color: var(--text-muted); background: var(--surface-hover); }
        .opt.selected { border-color: var(--primary); background: rgba(16, 185, 129, 0.08); font-weight: 600; }
        
        .nav-btn { background: var(--surface-hover); color: var(--text); }
        .nav-btn:hover { background: var(--border); }
        
        /* Review UI */
        .review-card { background: var(--bg); border: 1px solid var(--border); padding: 24px; border-radius: 12px; margin-bottom: 16px; }
        .review-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
        .tag-correct { background: rgba(16,185,129,0.2); color: var(--primary); }
        .tag-wrong { background: rgba(239,68,68,0.2); color: #ef4444; }
        .exp-box { background: var(--surface); padding: 16px; border-radius: 8px; margin-top: 16px; border-left: 4px solid var(--primary); font-size: 14px; color: var(--text-muted); }
    </style>
</head>
<body>

<div id="entry-card" class="card">
    <h2 id="sub-title">Student Portal</h2>
    <p class="subtitle" id="status-msg">Enter your credentials to access the assessment.</p>
    
    <label>Candidate Full Name</label>
    <input type="text" id="s-name" placeholder="e.g. John Doe">
    
    <label>Class / Cohort Level</label>
    <input type="text" id="s-class" placeholder="e.g. SSS 3 Science">
    
    <button id="start-btn" onclick="validateAttempt()">Begin Assessment</button>
</div>

<div id="exam-card" class="card hidden" style="max-width: 800px;">
    <div class="header-bar">
        <div><span style="color:var(--text-muted); font-size:14px; font-weight:600" id="progress-text">Question 1 of 10</span></div>
        <div class="timer-box" id="timer">00:00</div>
    </div>
    
    <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>
    
    <div class="question-text" id="q-text"></div>
    <div id="options-box"></div>
    
    <div style="display:flex; gap:16px; margin-top:40px">
        <button class="nav-btn" onclick="prev()" style="width:120px">← Back</button>
        <button onclick="next()" id="next-btn">Next Question →</button>
    </div>
</div>

<div id="result-view" class="card hidden" style="max-width: 800px;">
    <h2>Assessment Complete</h2>
    <p class="subtitle">Your results have been securely submitted to your instructor.</p>
    
    <div style="background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:40px; text-align:center; margin:30px 0;">
        <div style="font-size:16px; color:var(--text-muted); font-weight:600; text-transform:uppercase">Final Score</div>
        <div id="score-text" style="font-size:80px; font-weight:700; color:var(--primary); line-height:1">0/0</div>
    </div>
    
    <h3 style="margin-bottom: 20px;">Detailed Review</h3>
    <div id="review-list"></div>
</div>

<script>
    const SB_URL = 'https://pstnsaqjshmtintjrnas.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdG5zYXFqc2htdGludGpybmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDEzODUsImV4cCI6MjA5MTI3NzM4NX0.KNVgpVN0xp1njin1HL3udntc7psfzjnz7mqzpEN_Z6w';
    let exam = null, questions = [], current = 0, answers = {}, timeLeft = 0, attemptNum = 1;

    document.addEventListener("visibilitychange", () => {
        if (document.hidden && exam && !document.getElementById('exam-card').classList.contains('hidden')) {
            alert("⚠️ SYSTEM ALERT: Leaving the testing window is monitored and logged.");
        }
    });

    async function init() {
        const code = new URLSearchParams(window.location.search).get('code');
        if(!code) return document.getElementById('status-msg').innerHTML = "No exam code provided in URL.";
        
        try {
            const res = await fetch(`${SB_URL}/rest/v1/exams?code=eq.${code}`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
            const data = await res.json();
            
            // Handle RLS or actually closed exams gracefully
            if (!data.length || String(data[0].is_open) === "false") {
                document.getElementById('status-msg').innerHTML = "<span style='color:#ef4444'>Access Denied: Exam is currently closed.</span>";
                document.getElementById('start-btn').disabled = true;
                document.getElementById('start-btn').style.opacity = '0.5';
                return;
            }

            exam = data[0];
            document.getElementById('sub-title').innerText = exam.subject;
            let fullPool = JSON.parse(exam.csv_data);
            fullPool.sort(() => Math.random() - 0.5);
            questions = exam.select_count > 0 ? fullPool.slice(0, exam.select_count) : fullPool;
        } catch(e) { document.getElementById('status-msg').innerText = "Network Error. Please refresh."; }
    }

    async function validateAttempt() {
        const name = document.getElementById('s-name').value, sClass = document.getElementById('s-class').value;
        if (!name || !sClass) return alert("Please fill in both your Name and Class.");

        const btn = document.getElementById('start-btn');
        btn.innerText = "Verifying..."; btn.disabled = true;

        try {
            const res = await fetch(`${SB_URL}/rest/v1/results?student_name=eq.${name}&student_class=eq.${sClass}&exam_id=eq.${exam.id}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const history = await res.json();
            attemptNum = history.length + 1;

            if (history.length >= exam.attempt_limit) {
                alert(`Limit Reached: You have completed your ${exam.attempt_limit} allowed attempt(s).`);
                btn.innerText = "Begin Assessment"; btn.disabled = false;
                return;
            }
            startExam();
        } catch(e) { alert("Verification failed. Try again."); btn.innerText = "Begin Assessment"; btn.disabled = false; }
    }

    function startExam() {
        document.getElementById('entry-card').classList.add('hidden');
        document.getElementById('exam-card').classList.remove('hidden');
        timeLeft = exam.duration * 60;
        
        setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft <= 0) submitExam();
        }, 1000);
        showQ();
    }

    function showQ() {
        const q = questions[current];
        document.getElementById('q-text').innerText = `${current + 1}. ${q.q}`;
        document.getElementById('progress-text').innerText = `Question ${current + 1} of ${questions.length}`;
        document.getElementById('progress-bar').style.width = `${((current + 1) / questions.length) * 100}%`;
        
        const box = document.getElementById('options-box'); box.innerHTML = '';
        
        ['A','B','C','D'].forEach(l => {
            if(!q[l.toLowerCase()]) return; // Skip if option is empty in CSV
            const btn = document.createElement('div');
            btn.className = `opt ${answers[current] === l ? 'selected' : ''}`;
            btn.innerHTML = `<span style="font-weight:700; color:var(--text-muted); margin-right:15px">${l}</span> ${q[l.toLowerCase()]}`;
            btn.onclick = () => { answers[current] = l; showQ(); };
            box.appendChild(btn);
        });
        
        document.getElementById('next-btn').innerText = current === questions.length - 1 ? "Submit Assessment ✓" : "Next Question →";
    }

    function next() { if (current < questions.length - 1) { current++; showQ(); } else if(confirm("Are you sure you want to submit your final answers?")) submitExam(); }
    function prev() { if (current > 0) { current--; showQ(); } }

    async function submitExam() {
        document.getElementById('exam-card').innerHTML = `<div style="text-align:center; padding:50px"><h2>Submitting Results...</h2></div>`;
        
        let score = 0;
        questions.forEach((q, i) => { if(answers[i] === q.ans) score++; });
        
        document.getElementById('exam-card').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${score}/${questions.length}`;

        document.getElementById('review-list').innerHTML = questions.map((q, i) => {
            const isCorrect = answers[i] === q.ans;
            return `
            <div class="review-card">
                <div class="review-tag ${isCorrect ? 'tag-correct' : 'tag-wrong'}">${isCorrect ? '✓ CORRECT' : '✕ INCORRECT'}</div>
                <div style="font-weight:600; font-size:16px; margin-bottom:12px">${i+1}. ${q.q}</div>
                <div style="font-size:14px; color:var(--text-muted); margin-bottom:8px">Your Selection: <span style="color:${isCorrect?'var(--primary)':'#ef4444'}; font-weight:700">${answers[i] || 'None'}</span></div>
                ${!isCorrect ? `<div style="font-size:14px; color:var(--text-muted)">Correct Answer: <span style="color:var(--primary); font-weight:700">${q.ans}</span></div>` : ''}
                <div class="exp-box"><strong>Explanation:</strong><br>${q.exp || 'No explanation provided by instructor.'}</div>
            </div>`;
        }).join('');

        await fetch(`${SB_URL}/rest/v1/results`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                exam_id: exam.id, student_name: document.getElementById('s-name').value,
                student_class: document.getElementById('s-class').value,
                score, total: questions.length, attempt_number: attemptNum,
                time_taken: (exam.duration * 60) - timeLeft
            })
        });
    }
    init();
</script>
</body>
</html>
