<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CBT.ng — Take Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  /* Same base styling as teacher dashboard */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{ --bg:#0d1117;--sf:#161b22;--sf2:#1e2530;--bd:#2a3442;--ac:#00c896;--tx:#e6edf3;--mu:#7d8fa0;--r:12px; }
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);padding:16px;display:flex;flex-direction:column;align-items:center}
  .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:24px;width:100%;max-width:600px}
  .view{display:none} .view.active{display:block}
  .opt{display:block; padding:12px; background:var(--sf2); border:1px solid var(--bd); margin:8px 0; border-radius:8px; cursor:pointer}
  .opt:hover{border-color:var(--ac)}
  input[type="radio"]{margin-right:10px}
  button{width:100%; padding:12px; margin-top:10px; background:var(--ac); border:none; border-radius:8px; font-weight:bold; cursor:pointer}
</style>
</head>
<body>

<div id="setup-view" class="view active">
  <div class="card">
    <h2 id="exam-title">Loading Exam...</h2>
    <div id="setup-form" style="display:none">
      <input type="text" id="s-name" placeholder="Full Name" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; background:var(--sf2); color:white; border:1px solid var(--bd)">
      <input type="text" id="s-class" placeholder="Class" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; background:var(--sf2); color:white; border:1px solid var(--bd)">
      <button onclick="startExam()">Start Examination</button>
    </div>
  </div>
</div>

<div id="exam-view" class="view">
  <div class="card">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px">
      <span id="q-count">Question 1</span>
      <span id="timer" style="color:var(--ac); font-weight:bold">00:00</span>
    </div>
    <h3 id="q-text" style="margin-bottom:20px"></h3>
    <div id="options-list"></div>
    <button id="next-btn" onclick="nextQuestion()">Next Question</button>
  </div>
</div>

<div id="result-view" class="view">
  <div class="card" style="text-align:center">
    <h2>Exam Finished!</h2>
    <h1 id="score-text" style="font-size:48px; margin:20px 0; color:var(--ac)">0/0</h1>
    <p id="feedback"></p>
  </div>
</div>

<script>
  const SB_URL = 'YOUR_SUPABASE_URL';
  const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';

  let exam = null;
  let questions = [];
  let currentIdx = 0;
  let score = 0;
  let timeLeft = 0;
  let timerInterval;

  const g = (id) => document.getElementById(id);

  async function sbFetch(path, method = 'GET', body = null) {
    const options = {
      method,
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' }
    };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`${SB_URL}${path}`, options);
    return response.json();
  }

  async function init() {
    const code = new URLSearchParams(window.location.search).get('code');
    if (!code) return g('exam-title').textContent = "No Exam Code Provided";
    
    try {
      const data = await sbFetch(`/rest/v1/exams?code=eq.${code}&select=*`);
      if (data.length) {
        exam = data[0];
        questions = JSON.parse(exam.csv_data);
        g('exam-title').textContent = exam.subject;
        g('setup-form').style.display = 'block';
      } else {
        g('exam-title').textContent = "Exam Not Found";
      }
    } catch (e) { console.error(e); }
  }

  function startExam() {
    if (!g('s-name').value) return alert("Enter your name");
    g('setup-view').classList.remove('active');
    g('exam-view').classList.add('active');
    timeLeft = exam.duration * 60;
    startTimer();
    showQuestion();
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      timeLeft--;
      const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      g('timer').textContent = `${m}:${s < 10 ? '0'+s : s}`;
      if (timeLeft <= 0) finishExam();
    }, 1000);
  }

  function showQuestion() {
    const q = questions[currentIdx];
    g('q-count').textContent = `Question ${currentIdx + 1} of ${questions.length}`;
    g('q-text').textContent = q.q;
    g('options-list').innerHTML = q.opts.map(o => `
      <label class="opt">
        <input type="radio" name="opt" value="${o.l}"> ${o.l}. ${o.t}
      </label>
    `).join('');
    if (currentIdx === questions.length - 1) g('next-btn').textContent = "Finish Exam";
  }

  async function nextQuestion() {
    const selected = document.querySelector('input[name="opt"]:checked');
    if (!selected) return alert("Select an answer");
    
    if (selected.value === questions[currentIdx].ans) score++;
    
    if (currentIdx < questions.length - 1) {
      currentIdx++;
      showQuestion();
    } else {
      finishExam();
    }
  }

  async function finishExam() {
    clearInterval(timerInterval);
    g('exam-view').classList.remove('active');
    g('result-view').classList.add('active');
    g('score-text').textContent = `${score}/${questions.length}`;
    
    // Save Result
    try {
      await sbFetch('/rest/v1/results', 'POST', {
        exam_id: exam.id,
        student_name: g('s-name').value,
        student_class: g('s-class').value,
        score: score,
        total: questions.length,
        time_taken: (exam.duration * 60) - timeLeft
      });
    } catch (e) { console.error("Save Failed", e); }
  }

  init();
</script>
</body>
</html>
