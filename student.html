<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --primary: #10b981;
            --border: #27272a;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .hidden {
            display: none !important;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #000;
            color: #fff;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .opt {
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .opt:hover {
            border-color: var(--primary);
        }

        .opt.selected {
            border-color: var(--primary);
            background: rgba(16,185,129,0.1);
        }

        .status-box {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status-error {
            background: rgba(239,68,68,0.1);
            color: var(--danger);
            border: 1px solid rgba(239,68,68,0.3);
        }
    </style>
</head>
<body>

<div id="entry-card" class="card">
    <h2 style="text-align:center">Student Portal</h2>
    <p style="text-align:center; color:var(--text-muted)">Verify your details to begin the assessment.</p>

    <div id="status-message"></div>

    <input type="text" id="s-name" placeholder="Full Name">
    <input type="text" id="s-class" placeholder="Class">
    <button id="start-btn" onclick="validateAttempt()">Start Assessment</button>
</div>

<div id="exam-card" class="card hidden" style="max-width: 800px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px; gap:10px; flex-wrap:wrap;">
        <span id="progress-text"></span>
        <span id="timer" style="color:var(--primary); font-weight:800;"></span>
    </div>

    <div id="q-text" style="font-size:20px; margin-bottom:30px;"></div>
    <div id="options-box"></div>

    <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="prev()" style="background:var(--border); color:#fff; width:120px;">Back</button>
        <button onclick="next()" id="next-btn">Next</button>
    </div>
</div>

<div id="result-view" class="card hidden" style="max-width: 800px; text-align:center;">
    <h2>Results Saved Successfully</h2>
    <h1 id="score-text" style="color:var(--primary); font-size:72px;"></h1>
    <p style="color:var(--text-muted); margin-top:20px;">You may now close this page.</p>
</div>

<script>
const SB_URL = 'https://pstnsaqjshmtintjrnas.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdG5zYXFqc2htdGludGpybmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDEzODUsImV4cCI6MjA5MTI3NzM4NX0.KNVgpVN0xp1njin1HL3udntc7psfzjnz7mqzpEN_Z6w';

let exam = null;
let questions = [];
let current = 0;
let answers = {};
let timeLeft = 0;
let attemptNum = 1;
let timerObj = null;
let tabSwitchCount = 0;

function showError(message) {
    document.getElementById('status-message').innerHTML = `
        <div class="status-box status-error">${message}</div>
    `;
}

async function init() {
    const code = new URLSearchParams(window.location.search).get('code');

    if (!code) {
        showError('Invalid exam link. No exam code was found.');
        document.getElementById('start-btn').disabled = true;
        return;
    }

    try {
        const res = await fetch(`${SB_URL}/rest/v1/exams?code=eq.${code}&select=*`, {
            headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`
            }
        });

        if (!res.ok) {
            throw new Error('Unable to connect to exam database.');
        }

        const data = await res.json();

        if (!data.length) {
            showError('Exam not found.');
            document.getElementById('start-btn').disabled = true;
            return;
        }

        exam = data[0];

        if (!exam.is_open) {
            showError('This exam is currently closed.');
            document.getElementById('start-btn').disabled = true;
            return;
        }

        questions = JSON.parse(exam.csv_data).sort(() => Math.random() - 0.5);

        if (Number(exam.select_count) > 0) {
            questions = questions.slice(0, Number(exam.select_count));
        }

    } catch (e) {
        console.error(e);
        showError('Connection error. Please refresh and try again.');
        document.getElementById('start-btn').disabled = true;
    }
}

async function validateAttempt() {
    const n = document.getElementById('s-name').value.trim();
    const c = document.getElementById('s-class').value.trim();

    if (!n || !c) {
        alert('Fill in all details.');
        return;
    }

    if (!exam) {
        alert('Exam data has not loaded. Please refresh the page.');
        return;
    }

    const btn = document.getElementById('start-btn');
    btn.innerText = 'Checking...';
    btn.disabled = true;

    try {
        const res = await fetch(`${SB_URL}/rest/v1/results?student_name=eq.${encodeURIComponent(n)}&student_class=eq.${encodeURIComponent(c)}&exam_id=eq.${exam.id}&select=*`, {
            headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`
            }
        });

        if (!res.ok) {
            throw new Error('Could not verify student attempts.');
        }

        const history = await res.json();
        attemptNum = history.length + 1;

        if (attemptNum > Number(exam.attempt_limit)) {
            alert('Attempt limit exceeded for this exam.');
            btn.innerText = 'Start Assessment';
            btn.disabled = false;
            return;
        }

        startExam();

    } catch (e) {
        console.error(e);
        alert('Connection error. Please try again.');
        btn.innerText = 'Start Assessment';
        btn.disabled = false;
    }
}

function startExam() {
    document.getElementById('entry-card').classList.add('hidden');
    document.getElementById('exam-card').classList.remove('hidden');

    timeLeft = Number(exam.duration) * 60;

    timerObj = setInterval(() => {
        timeLeft--;

        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;

        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;

        if (timeLeft <= 0) {
            submitExam();
        }
    }, 1000);

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            tabSwitchCount++;

            if (tabSwitchCount >= 2) {
                alert('Tab switching detected. Exam will be submitted automatically.');
                submitExam();
            }
        }
    });

    window.onbeforeunload = function() {
        return 'You cannot leave during the exam.';
    };

    showQ();
}

function showQ() {
    const q = questions[current];

    document.getElementById('q-text').innerText = `${current + 1}. ${q.q}`;
    document.getElementById('progress-text').innerText = `Question ${current + 1} of ${questions.length}`;

    const box = document.getElementById('options-box');
    box.innerHTML = '';

    ['A', 'B', 'C', 'D'].forEach(letter => {
        const val = q[letter.toLowerCase()];

        if (!val) return;

        const div = document.createElement('div');
        div.className = `opt ${answers[current] === letter ? 'selected' : ''}`;
        div.innerHTML = `<strong>${letter}.</strong> ${val}`;

        div.onclick = () => {
            answers[current] = letter;
            showQ();
        };

        box.appendChild(div);
    });

    document.getElementById('next-btn').innerText = current === questions.length - 1 ? 'Submit Exam' : 'Next';
}

function next() {
    if (current < questions.length - 1) {
        current++;
        showQ();
    } else {
        const confirmSubmit = confirm('Are you sure you want to submit your exam?');
        if (confirmSubmit) {
            submitExam();
        }
    }
}

function prev() {
    if (current > 0) {
        current--;
        showQ();
    }
}

async function submitExam() {
    clearInterval(timerObj);
    window.onbeforeunload = null;

    let score = 0;

    questions.forEach((q, i) => {
        if (answers[i] === q.ans) {
            score++;
        }
    });

    document.getElementById('exam-card').classList.add('hidden');
    document.getElementById('result-view').classList.remove('hidden');
    document.getElementById('score-text').innerText = `${score} / ${questions.length}`;

    try {
        const response = await fetch(`${SB_URL}/rest/v1/results`, {
            method: 'POST',
            headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                exam_id: exam.id,
                student_name: document.getElementById('s-name').value.trim(),
                student_class: document.getElementById('s-class').value.trim(),
                score: score,
                total: questions.length,
                attempt_number: attemptNum,
                time_taken: (Number(exam.duration) * 60) - timeLeft
            })
        });

        if (!response.ok) {
            const err = await response.text();
            console.error(err);
            alert('Result could not be saved to the database.');
        }

    } catch (e) {
        console.error(e);
        alert('An error occurred while saving your result.');
    }
}

init();
</script>

</body>
</html>
