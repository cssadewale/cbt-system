<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #09090b; --surface: #18181b; --primary: #10b981; --border: #27272a; --text: #f4f4f5; --text-muted: #a1a1aa; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; margin: 0; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 20px; width: 100%; max-width: 600px; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; margin: 10px 0 25px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; }
        button { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
        .opt { padding: 15px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .opt.selected { border-color: var(--primary); background: rgba(16,185,129,0.1); }
        .review-card { border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="entry-card" class="card">
    <h2 style="text-align:center">Student Portal</h2>
    <p id="status-msg" style="text-align:center; color:var(--text-muted)">Enter details to begin.</p>
    <input type="text" id="s-name" placeholder="Full Name">
    <input type="text" id="s-class" placeholder="Class (e.g. SSS 1)">
    <button id="start-btn" onclick="validateAttempt()">Start Exam</button>
</div>

<div id="exam-card" class="card hidden" style="max-width: 800px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px">
        <span id="progress-text"></span>
        <span id="timer" style="color:var(--primary); font-weight:700"></span>
    </div>
    <div id="q-text" style="font-size:20px; margin-bottom:20px"></div>
    <div id="options-box"></div>
    <div style="display:flex; gap:10px; margin-top:20px">
        <button onclick="prev()" style="background:var(--border); color:#fff">Back</button>
        <button onclick="next()" id="next-btn">Next</button>
    </div>
</div>

<div id="result-view" class="card hidden" style="max-width: 800px; text-align:center;">
    <h2>Results Submitted</h2>
    <h1 id="score-text" style="color:var(--primary); font-size:60px"></h1>
    <div id="review-list" style="text-align:left; margin-top:20px"></div>
</div>

<script>
    const SB_URL = 'https://pstnsaqjshmtintjrnas.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdG5zYXFqc2htdGludGpybmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDEzODUsImV4cCI6MjA5MTI3NzM4NX0.KNVgpVN0xp1njin1HL3udntc7psfzjnz7mqzpEN_Z6w';
    
    let exam=null, questions=[], current=0, answers={}, timeLeft=0, attemptNum=1, timerObj=null;

    async function init() {
        const code = new URLSearchParams(window.location.search).get('code');
        if(!code) return;
        try {
            const res = await fetch(`${SB_URL}/rest/v1/exams?code=eq.${code}`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
            const data = await res.json();
            if(data.length) {
                exam = data[0];
                let pool = JSON.parse(exam.csv_data);
                pool.sort(() => Math.random() - 0.5);
                questions = exam.select_count > 0 ? pool.slice(0, exam.select_count) : pool;
            }
        } catch(e) { console.error(e); }
    }

    async function validateAttempt() {
        const n = document.getElementById('s-name').value;
        const c = document.getElementById('s-class').value;
        if(!n || !c) return alert("Enter details");

        const btn = document.getElementById('start-btn');
        btn.innerText = "Connecting..."; btn.disabled = true;

        try {
            const res = await fetch(`${SB_URL}/rest/v1/results?student_name=eq.${encodeURIComponent(n)}&student_class=eq.${encodeURIComponent(c)}&exam_id=eq.${exam.id}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            if(!res.ok) throw new Error("Table 'results' not found. Run the SQL code in Supabase!");
            
            const history = await res.json();
            attemptNum = (history ? history.length : 0) + 1;
            if(history && history.length >= exam.attempt_limit) return alert("Attempt limit reached.");
            
            startExam();
        } catch(e) { 
            alert(e.message); 
            btn.innerText = "Start Exam"; btn.disabled = false;
        }
    }

    function startExam() {
        document.getElementById('entry-card').classList.add('hidden');
        document.getElementById('exam-card').classList.remove('hidden');
        timeLeft = exam.duration * 60;
        timerObj = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft <= 0) submitExam();
        }, 1000);
        showQ();
    }

    function showQ() {
        const q = questions[current];
        document.getElementById('q-text').innerText = `${current+1}. ${q.q}`;
        document.getElementById('progress-text').innerText = `Question ${current+1}/${questions.length}`;
        const box = document.getElementById('options-box'); box.innerHTML = '';
        ['A','B','C','D'].forEach(l => {
            if(!q[l.toLowerCase()]) return;
            const dv = document.createElement('div');
            dv.className = `opt ${answers[current] === l ? 'selected' : ''}`;
            dv.innerHTML = `<b>${l}.</b> ${q[l.toLowerCase()]}`;
            dv.onclick = () => { answers[current] = l; showQ(); };
            box.appendChild(dv);
        });
        document.getElementById('next-btn').innerText = current === questions.length - 1 ? "Submit" : "Next";
    }

    function next() { 
        if(current < questions.length - 1) { current++; showQ(); } 
        else { if(confirm("Submit?")) submitExam(); }
    }
    function prev() { if(current > 0) { current--; showQ(); } }

    async function submitExam() {
        clearInterval(timerObj);
        let score = 0;
        questions.forEach((q, i) => { if(answers[i] === q.ans) score++; });
        
        document.getElementById('exam-card').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${score}/${questions.length}`;

        try {
            await fetch(`${SB_URL}/rest/v1/results`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    exam_id: exam.id, student_name: document.getElementById('s-name').value,
                    student_class: document.getElementById('s-class').value,
                    score, total: questions.length, attempt_number: attemptNum,
                    time_taken: (exam.duration * 60) - timeLeft
                })
            });
        } catch(e) { console.error("Save failed"); }
    }
    init();
</script>
</body>
</html>
