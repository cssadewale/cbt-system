<!DOCTYPE html>
<html>
<head>
<title>Teacher</title>
<style>
body{font-family:sans-serif;background:#111;color:#fff}
.card{background:#222;padding:20px;margin-bottom:20px}
</style>
</head>

<body>

<div class="card">
<h3>Create Exam</h3>
<input id="sub" placeholder="Subject"><br><br>
<input id="dur" type="number" placeholder="Duration"><br><br>
<input id="limit" type="number" placeholder="Attempts"><br><br>
<input id="csv" type="file"><br><br>
<button onclick="createExam()">Publish</button>
</div>

<div class="card">
<h3>Exams</h3>
<div id="list"></div>
</div>

<script>
const SB_URL='https://pstnsaqjshmtintjrnas.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdG5zYXFqc2htdGludGpybmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDEzODUsImV4cCI6MjA5MTI3NzM4NX0.KNVgpVN0xp1njin1HL3udntc7psfzjnz7mqzpEN_Z6w';

let pool=[], exams=[];

csv.onchange=e=>{
 const r=new FileReader();
 r.onload=()=>{
  const lines=r.result.split('\\n').slice(1);
  pool=lines.map(l=>{
   const p=l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
   return {q:p[0],a:p[1],b:p[2],c:p[3],d:p[4],ans:p[5]};
  });
 };
 r.readAsText(e.target.files[0]);
};

async function createExam(){
 if(!pool.length) return alert("Upload CSV");

 const payload={
  subject:sub.value,
  duration:parseInt(dur.value),
  attempt_limit:parseInt(limit.value),
  code:Math.random().toString(36).substring(2,7),
  csv_data:JSON.stringify(pool)
 };

 const res=await fetch(`${SB_URL}/rest/v1/exams`,{
  method:'POST',
  headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
  body:JSON.stringify(payload)
 });

 const d=await res.json();
 alert("Code: "+d[0].code);

 load();
}

async function load(){
 const r=await fetch(`${SB_URL}/rest/v1/exams?select=*`,{
  headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}
 });
 exams=await r.json();

 list.innerHTML=exams.map(e=>`
 <div>
 ${e.subject} | ${e.code}
 <button onclick="del('${e.id}')">Delete</button>
 </div>`).join('');
}

async function del(id){
 if(!confirm("Delete?")) return;

 await fetch(`${SB_URL}/rest/v1/exams?id=eq.${id}`,{
  method:'DELETE',
  headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}
 });

 load();
}

load();
</script>

</body>
</html>
