<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CBT.ng — Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1117;--sf:#161b22;--sf2:#1e2530;--bd:#2a3442;
    --ac:#00c896;--ad:#00c89622;--warn:#f0a500;--err:#e05252;
    --ok:#00c896;--tx:#e6edf3;--mu:#7d8fa0;--r:12px;
  }
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);padding:16px;display:flex;flex-direction:column;align-items:center}
  .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:24px;width:100%;max-width:500px;margin-bottom:20px}
  .view{display:none; width:100%; max-width:800px;}
  .view.active{display:block}
  input, select, button{width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid var(--bd); background:var(--sf2); color:white; font-family:inherit}
  button{background:var(--ac); color:var(--bg); font-weight:700; cursor:pointer; border:none}
  button.sec{background:transparent; color:var(--mu); border:1px solid var(--bd)}
  table{width:100%; border-collapse:collapse; margin-top:20px}
  th, td{text-align:left; padding:12px; border-bottom:1px solid var(--bd)}
  .badge{padding:4px 8px; border-radius:4px; font-size:12px; background:var(--ad); color:var(--ac)}
</style>
</head>
<body>

<div id="auth-view" class="view active">
  <div class="card">
    <h2>Teacher Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="handleAuth('login')">Login</button>
    <button class="sec" onclick="handleAuth('signup')">Create Account</button>
  </div>
</div>

<div id="dash-view" class="view">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
    <h1>Dashboard</h1>
    <button style="width:auto" class="sec" onclick="logout()">Logout</button>
  </header>
  
  <div class="card" style="max-width:100%">
    <h3>Set New Exam</h3>
    <input type="text" id="ex-sub" placeholder="Subject Name (e.g. Physics 101)">
    <input type="number" id="ex-dur" placeholder="Duration (Minutes)">
    <input type="file" id="csv-file" accept=".csv">
    <button onclick="createExam()">Create Exam & Generate Link</button>
  </div>

  <h3>Your Exams</h3>
  <div id="exam-list">Loading exams...</div>
</div>

<script>
  // CONFIGURATION
  const SB_URL = 'https://pstnsaqjshmtintjrnas.supabase.co'; 
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdG5zYXFqc2htdGludGpybmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDEzODUsImV4cCI6MjA5MTI3NzM4NX0.KNVgpVN0xp1njin1HL3udntc7psfzjnz7mqzpEN_Z6w';

  let session = null;
  let user = null;
  let questions = [];

  const g = (id) => document.getElementById(id);

  async function sbFetch(path, method = 'GET', body = null) {
    const token = session ? session.access_token : SB_KEY;
    const options = {
      method,
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      }
    };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`${SB_URL}${path}`, options);
    const data = await response.json();
    if (!response.ok) throw data;
    return data;
  }

  async function handleAuth(type) {
    const email = g('email').value;
    const password = g('pass').value;
    try {
      const data = await sbFetch(`/auth/v1/${type === 'login' ? 'token?grant_type=password' : 'signup'}`, 'POST', { email, password });
      session = data;
      user = data.user;
      showDash();
    } catch (e) { alert(e.error_description || e.msg || "Auth Failed"); }
  }

  function showDash() {
    g('auth-view').classList.remove('active');
    g('dash-view').classList.add('active');
    loadExams();
  }

  // Simple CSV Parser
  g('csv-file').addEventListener('change', (e) => {
    const reader = new FileReader();
    reader.onload = () => {
      const rows = reader.result.split('\n').slice(1);
      questions = rows.filter(r => r.trim()).map(r => {
        const [q, a, b, c, d, ans] = r.split(',');
        return { q, opts: [{l:'A',t:a},{l:'B',t:b},{l:'C',t:c},{l:'D',t:d}], ans: ans.trim().toUpperCase() };
      });
    };
    reader.readAsText(e.target.files[0]);
  });

  async function createExam() {
    const subject = g('ex-sub').value;
    const duration = g('ex-dur').value;
    if (!subject || questions.length === 0) return alert("Fill subject and upload CSV");

    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
    
    try {
      await sbFetch('/rest/v1/exams', 'POST', {
        subject,
        duration: parseInt(duration),
        code,
        csv_data: JSON.stringify(questions),
        teacher_id: user.id // Required for RLS
      });
      alert(`Exam Created! Code: ${code}`);
      loadExams();
    } catch (e) { alert("Error: " + e.message); }
  }

  async function loadExams() {
    try {
      const exams = await sbFetch('/rest/v1/exams?select=*');
      g('exam-list').innerHTML = `
        <table>
          <tr><th>Subject</th><th>Code</th><th>Link</th></tr>
          ${exams.map(e => `
            <tr>
              <td>${e.subject}</td>
              <td><code>${e.code}</code></td>
              <td><a href="student.html?code=${e.code}" target="_blank" style="color:var(--ac)">Open Exam</a></td>
            </tr>
          `).join('')}
        </table>`;
    } catch (e) { console.error(e); }
  }

  function logout() { location.reload(); }
</script>
</body>
</html>
