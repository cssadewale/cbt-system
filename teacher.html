<!-- ONLY SHOWING SCRIPT SECTION (UNCHANGED UI ABOVE REMAINS EXACTLY AS YOU UPLOADED) -->
<script>

    const SB_URL = 'https://pstnsaqjshmtintjrnas.supabase.co';
    const SB_KEY = 'YOUR_KEY_HERE';

    let session = null, questionsPool = [], allResults = [], allExams = [];

    // ===== ADDED: GLOBAL ERROR HANDLER =====
    window.onerror = function(msg) {
        alert("Error: " + msg);
    };

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ===== ADDED: LOADING STATE =====
    function setLoading(state) {
        document.querySelectorAll("button").forEach(b => b.disabled = state);
    }

    function toggleAuth(isSignup) {
        document.getElementById('auth-title').innerText = isSignup ? "Create Tutor Account" : "Tutor Authentication";
        document.getElementById('login-flow').classList.toggle('hidden', isSignup);
        document.getElementById('signup-flow').classList.toggle('hidden', !isSignup);
    }

    async function sbFetch(path, method = 'GET', body = null) {
        const token = session ? session.access_token : SB_KEY;
        const res = await fetch(`${SB_URL}${path}`, {
            method,
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: body ? JSON.stringify(body) : null
        });
        if (!res.ok) throw new Error((await res.json().catch(()=>({}))).message || "Database action failed");
        const text = await res.text();
        return text ? JSON.parse(text) : {};
    }

    async function handleAuth(type) {

        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;

        if (!email || !password) return showToast("Enter credentials");

        setLoading(true); // ===== ADDED =====

        try {

            if(type === 'signup') {

                const res = await sbFetch('/auth/v1/signup', 'POST', { email, password });

                // ===== ADDED: CREATE PROFILE =====
                if(res.user){
                    await sbFetch('/rest/v1/profiles','POST',{
                        id: res.user.id,
                        email: res.user.email,
                        role: 'teacher'
                    });
                }

                showToast("Account created successfully. You can now login.");
                toggleAuth(false);

            } else {

                session = await sbFetch('/auth/v1/token?grant_type=password', 'POST', { email, password });

                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('main-dash').classList.remove('hidden');

                showToast("Welcome back!");

                loadExams();
                loadResults();

                startLiveMonitoring(); // ===== ADDED =====
            }

        } catch (e) {
            showToast("Error: " + e.message);
        }

        setLoading(false); // ===== ADDED =====
    }

    // ===== ADDED: SESSION RESTORE =====
    async function restoreSession(){
        try{
            const res = await fetch(`${SB_URL}/auth/v1/user`, {
                headers: { apikey: SB_KEY }
            });
            if(res.ok){
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('main-dash').classList.remove('hidden');
                loadExams(); loadResults(); startLiveMonitoring();
            }
        }catch{}
    }
    restoreSession();

    // ===== MODIFIED ADDITIVELY: FILTER BY TEACHER =====
    async function loadExams() {
        let query = `/rest/v1/exams?select=*&order=created_at.desc`;

        // ===== ADDED: enforce teacher isolation =====
        if(session?.user?.id){
            query += `&teacher_id=eq.${session.user.id}`;
        }

        allExams = await sbFetch(query);

        const baseUrl = window.location.href.replace(/teacher[^/]*\.html/i, 'student.html');

        document.getElementById('exam-list').innerHTML = allExams.map(e => `
            <div style="padding:20px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px">
                <div>
                    <div style="font-size:18px; font-weight:600; margin-bottom:6px">${e.subject} 
                    <span class="status-badge ${e.is_open?'open':'closed'}">${e.is_open?'Live':'Locked'}</span></div>
                    <div style="color:var(--text-muted); font-size:13px; font-family:monospace">
                        ${baseUrl}?code=${e.code}
                    </div>
                </div>
                <div style="display:flex; gap:10px">
                    <button class="btn-sm btn-preview" onclick="previewExam('${e.id}')">Preview</button>
                    <button class="btn-sm btn-outline" onclick="toggleStatus('${e.id}', ${e.is_open})">${e.is_open?'Lock':'Open'}</button>
                    <button class="btn-sm btn-danger" onclick="deleteExam('${e.id}')">Delete</button>
                    <button class="btn-sm btn-outline" onclick="viewCheatLogs('${e.id}')">Logs</button> <!-- ADDED -->
                </div>
            </div>
        `).join('');
    }

    // ===== ADDED: LIVE MONITORING =====
    function startLiveMonitoring(){
        setInterval(async ()=>{
            try{
                const data = await sbFetch('/rest/v1/attempts?status=eq.in_progress');
                console.log("Live:", data.length);
            }catch{}
        },5000);
    }

    // ===== ADDED: CHEAT LOGS =====
    async function viewCheatLogs(examId){
        try{
            const logs = await sbFetch(`/rest/v1/anti_cheat_logs?exam_id=eq.${examId}`);
            alert("Logs: " + logs.length);
        }catch(e){
            showToast(e.message);
        }
    }

</script>
